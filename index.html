<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Recents</title>
        <link rel="stylesheet" href="./assets/styles/main.css" />
    </head>
    <body>
        <header class="header container">
            <div class="header__container">
                <a href="" class="header__logo">team.flow</a>
                <nav class="header__menu hidden-mobile">
                    <ul class="header__menu-list">
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link drop-button"
                                >How it Works</a
                            >
                        </li>
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link drop-button"
                                >Product</a
                            >
                        </li>
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link">Pricing</a>
                        </li>
                        <li class="header__menu-item">
                            <a href="" class="header__menu-link drop-button"
                                >Resources</a
                            >
                        </li>
                    </ul>
                </nav>
                <div class="header__reg hidden-mobile">
                    <a href="" class="header__reg-login">Log in</a>
                    <a href="" class="header__reg-start button button--alt"
                        >Get started free</a
                    >
                </div>
                <div class="header__burger-button burger-button visible-mobile">
                    <span class="burger-button__line"></span>
                    <span class="burger-button__line"></span>
                    <span class="burger-button__line"></span>
                    <p class="burger-button__text">Menu</p>
                </div>
            </div>
        </header>
        <main class="main">
            <section class="container hero">
                <div class="hero__container">
                    <div class="hero__header">
                        <a href="" class="hero__header-save"
                            >Get account of $59></a
                        >
                        <h1 class="hero__header-title">
                            Manage the team everyone wants to be on
                        </h1>
                        <p class="hero__header-subtitle">
                            Simple platform that lets you master what great
                            managers do best, as develop trust, collaborate, and
                            drive team performance.
                        </p>
                        <div class="hero__header-reg">
                            <input
                                type="email"
                                class="hero__header-input"
                                placeholder="name@yourcompany.com"
                            />
                            <button class="hero__header-button button">
                                Try it free
                            </button>
                        </div>
                    </div>
                    <div class="hero__graph">
                        <img
                            src="./assets/images/graph-hero.png"
                            alt="Overiew graph"
                            class="hero__graph-img"
                        />
                    </div>
                </div>
            </section>
        </main>
    </body>
</html>
